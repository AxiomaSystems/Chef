name: API Baseline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-baseline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cart_generator_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cart_generator_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cart_generator_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/cart_generator_ci?schema=public
      AUTH_JWT_SECRET: ci-jwt-secret
      AUTH_ACCESS_TOKEN_EXPIRES_IN: 15m
      AUTH_REFRESH_TOKEN_EXPIRES_IN_DAYS: '30'
      KROGER_USE_REAL_PROVIDER: 'false'
      INSTACART_USE_REAL_PROVIDER: 'false'
      WALMART_USE_REAL_PROVIDER: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @cart/shared build

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Apply Prisma migrations
        run: pnpm --dir apps/api exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter api db:seed

      - name: Build API
        run: pnpm --filter api build

      - name: Run API unit tests
        run: pnpm --filter api exec jest --runInBand

      - name: Run API e2e tests
        run: pnpm --filter api test:e2e:ci
