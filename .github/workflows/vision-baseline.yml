name: Vision Baseline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  vision-baseline:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: apps/vision-lab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Run vision smoke tests
        run: pnpm --filter vision-lab test
